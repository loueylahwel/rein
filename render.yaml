# One-click deploy of the PCocket relay on Render's free tier.
# Push this repo to GitHub, then on render.com: New -> Blueprint -> pick the
# repo. Render reads this file and gives you a fixed wss:// address forever.
services:
  - type: web
    name: pcocket-relay
    runtime: node
    rootDir: relay
    buildCommand: npm install
    startCommand: npm start
    plan: free
